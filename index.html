<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gospel Trap AI - Extreme Cinematic</title>
    <style>
        /* DESIGN CINEMATOGRÁFICO ULTRA HD */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        #video-bg {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1; object-fit: cover;
            filter: brightness(0.5) contrast(1.2) saturate(1.5);
            transition: opacity 1.5s ease-in-out;
        }

        .overlay {
            position: relative; z-index: 1;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 40px;
            width: 85%; max-width: 500px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { color: #fff; text-transform: uppercase; letter-spacing: 8px; font-size: 1rem; margin-bottom: 30px; opacity: 0.8; }

        #verso-texto {
            color: #00ffcc; font-size: 1.8rem; font-weight: 800;
            line-height: 1.3; margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            min-height: 120px;
        }

        #referencia { color: #ff0055; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }

        button {
            margin-top: 40px; background: #fff; color: #000;
            border: none; padding: 20px 50px; border-radius: 100px;
            font-weight: 900; cursor: pointer; font-size: 1rem;
            transition: 0.4s; box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        button:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <video autoplay muted loop id="video-bg">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-nebula-in-outer-space-3276-large.mp4" type="video/mp4">
    </video>

    <div class="overlay">
        <div class="glass-box">
            <h1>Criação Divina AI</h1>
            <div id="verso-texto">O Verbo se fez carne...</div>
            <div id="referencia">João 1:1</div>
            <button onclick="manifestarIA()">MANIFESTAR LOUVOR</button>
        </div>
    </div>

    <script>
        // LISTA DE COORDENADAS BÍBLICAS (A IA VAI SORTEAR)
        const coordenadas = [
            "Genesis+1:1", "Psalms+23:1", "Isaiah+40:31", "John+3:16", 
            "Revelation+21:6", "Psalms+19:1", "Job+12:7", "Colossians+1:16"
        ];

        async function manifestarIA() {
            const txt = document.getElementById('verso-texto');
            const ref = document.getElementById('referencia');
            const btn = document.querySelector('button');
            
            btn.innerText = "BUSCANDO NA CRIAÇÃO...";
            txt.style.opacity = "0.5";

            // Sorteia uma coordenada bíblica
            const rota = coordenadas[Math.floor(Math.random() * coordenadas.length)];

            try {
                // Busca automática na Internet (API Bíblia Digital)
                const resposta = await fetch(`https://bible-api.com/${rota}?translation=almeida`);
                const dados = await resposta.json();

                // Atualiza o ecrã com animação
                txt.style.opacity = "1";
                txt.innerText = `"${dados.text.trim()}"`;
                ref.innerText = — ${dados.reference};
                btn.innerText = "MANIFESTAR LOUVOR";

                // VOZ DIVINA (CONFIGURAÇÃO DE INTENSIDADE)
                const sinfonia = window.speechSynthesis;
                sinfonia.cancel(); // Para a voz anterior se houver
                const voz = new SpeechSynthesisUtterance(dados.text);
                
                voz.lang = 'pt-BR';
                voz.pitch = 0.4; // Voz profunda e imponente
                voz.rate = 0.85; // Velocidade solene
                voz.volume = 1.0; 
                
                sinfonia.speak(voz);

                // Efeito Visual Cinematográfico aleatório
                const video = document.getElementById('video-bg');
                video.style.filter = `hue-rotate(${Math.random() * 90}deg) brightness(0.6) contrast(1.3)`;

            } catch (erro) {
                txt.innerText = "A conexão falhou, mas a fé permanece. Tente de novo.";
                btn.innerText = "RECONECTAR";
            }
        }
    </script>
</body>
</html>
